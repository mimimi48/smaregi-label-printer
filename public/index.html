<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ラベル印刷</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">ラベル印刷</h1>
    <div class="printer-status" id="printerStatus">
      <span class="status-dot"></span>
      <span class="status-text">確認中…</span>
    </div>
  </header>

  <main>
    <!-- 検索画面 -->
    <section class="view active" id="searchView">
      <div class="search-bar">
        <div class="search-row">
          <input
            type="search"
            id="searchInput"
            placeholder="商品名またはJANコードで検索…"
            autocomplete="off"
            enterkeyhint="search"
          >
          <button class="btn-scan" id="scanBtn" aria-label="バーコードスキャン">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM20 14v7h-3"/>
              <path d="M14 20h3"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- バーコードスキャナー -->
      <div id="scannerContainer" hidden>
        <div id="scanner"></div>
        <button class="btn btn-ghost" id="closeScannerBtn">スキャナーを閉じる</button>
      </div>
      <div class="product-list" id="productList"></div>
      <div class="load-more" id="loadMore" hidden>
        <button class="btn btn-ghost" id="loadMoreBtn">もっと見る</button>
      </div>
    </section>

    <!-- 印刷キュー画面 -->
    <section class="view" id="queueView">
      <div class="queue-header">
        <h2>印刷キュー</h2>
        <button class="btn btn-ghost btn-sm" id="clearQueueBtn">全削除</button>
      </div>
      <div class="queue-list" id="queueList">
        <p class="empty-message">商品を追加してください</p>
      </div>
      <div class="queue-footer" id="queueFooter" hidden>
        <div class="queue-total">
          合計 <strong id="totalLabels">0</strong> 枚
        </div>
        <button class="btn btn-primary btn-lg" id="printAllBtn">印刷する</button>
      </div>
    </section>

    <!-- 設定画面 -->
    <section class="view" id="settingsView">
      <!-- PIN認証ゲート -->
      <div id="pinGate">
        <h2 class="settings-title">設定を表示するにはPINを入力</h2>
        <div class="settings-group">
          <label class="field">
            <span class="field-label">PIN</span>
            <input type="password" id="pinInput" placeholder="4〜8桁の数字" inputmode="numeric" maxlength="8">
          </label>
          <button class="btn btn-primary" id="pinSubmitBtn" style="width:100%">認証</button>
          <p class="settings-status" id="pinError"></p>
        </div>
      </div>

      <!-- 設定フォーム（PIN認証後に表示） -->
      <div id="settingsForm" hidden>
      <h2 class="settings-title">設定</h2>

      <div class="settings-group">
        <h3 class="settings-group-title">プリンター</h3>
        <label class="field">
          <span class="field-label">プリンターモデル</span>
          <select id="settingPrinterModel"></select>
        </label>
        <label class="field">
          <span class="field-label">ラベルサイズ</span>
          <select id="settingLabelSize"></select>
        </label>
        <label class="field">
          <span class="field-label">接続方式</span>
          <select id="settingPrinterConnectionType">
            <option value="tcp">LAN / Wi-Fi</option>
            <option value="airprint">iPad / iPhone AirPrint</option>
          </select>
        </label>
        <div id="tcpPrinterFields">
          <label class="field">
            <span class="field-label">プリンターIP</span>
            <input type="text" id="settingPrinterIp" placeholder="192.168.1.100" inputmode="decimal">
          </label>
          <label class="field">
            <span class="field-label">ポート</span>
            <input type="number" id="settingPrinterPort" placeholder="9100" inputmode="numeric">
          </label>
          <label class="field toggle-field">
            <span class="field-label">オートカット</span>
            <input type="checkbox" id="settingAutoCut">
            <span class="toggle-label" id="autoCutLabel">OFF</span>
          </label>
          <button class="btn btn-ghost btn-sm" id="discoverPrinterBtn">LANプリンターを自動検出</button>
          <div id="discoverResult" class="discover-result" hidden></div>
        </div>
        <div id="airPrintFields" hidden>
          <p class="field-help">印刷時にiPad/iPhoneの印刷画面が開きます。BrotherをAirPrint対応プリンターとして同じWi-Fiに接続してください。</p>
        </div>
      </div>

      <div class="settings-group">
        <h3 class="settings-group-title">スマレジAPI</h3>
        <label class="field">
          <span class="field-label">契約ID</span>
          <input type="text" id="settingContractId" placeholder="契約ID">
        </label>
        <label class="field">
          <span class="field-label">クライアントID</span>
          <input type="text" id="settingClientId" placeholder="クライアントID">
        </label>
        <label class="field">
          <span class="field-label">クライアントシークレット</span>
          <input type="password" id="settingClientSecret" placeholder="クライアントシークレット">
        </label>
      </div>

      <div class="settings-group">
        <h3 class="settings-group-title">セキュリティ</h3>
        <label class="field">
          <span class="field-label">設定画面PIN（4〜8桁の数字）</span>
          <input type="password" id="settingAppPin" placeholder="未設定の場合は認証なし" inputmode="numeric" maxlength="8">
        </label>
      </div>

      <div class="settings-actions">
        <button class="btn btn-primary btn-lg" id="saveSettingsBtn" style="width:100%">設定を保存</button>
      </div>

      <div class="settings-status" id="settingsStatus"></div>
      </div><!-- /settingsForm -->
    </section>

    <!-- プレビューモーダル -->
    <div class="modal" id="previewModal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>ラベルプレビュー</h3>
          <button class="btn-close" id="closePreview">&times;</button>
        </div>
        <div class="preview-image-wrap">
          <img id="previewImage" alt="ラベルプレビュー">
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="cancelPreview">閉じる</button>
        </div>
      </div>
    </div>

    <!-- iOS印刷方法選択モーダル -->
    <div class="modal" id="printMethodModal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>印刷方法を選択</h3>
          <button class="btn-close" id="closePrintMethod">&times;</button>
        </div>
        <div class="print-method-body">
          <button class="print-method-option" id="printMethodAirPrint">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="6" y="14" width="12" height="6" rx="1"/>
              <path d="M6 17H4a2 2 0 01-2-2v-4a2 2 0 012-2h16a2 2 0 012 2v4a2 2 0 01-2 2h-2"/>
              <path d="M6 9V4a1 1 0 011-1h10a1 1 0 011 1v5"/>
            </svg>
            <span class="print-method-label">AirPrint</span>
            <span class="print-method-desc">ブラウザの印刷機能で直接印刷</span>
          </button>
          <button class="print-method-option" id="printMethodPrn">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span class="print-method-label">PRNダウンロード</span>
            <span class="print-method-desc">Smooth Print等のアプリで印刷</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 印刷中オーバーレイ -->
    <div class="overlay" id="printingOverlay" hidden>
      <div class="overlay-content">
        <div class="spinner"></div>
        <p id="printingStatus">印刷中…</p>
      </div>
    </div>

    <div id="airPrintArea" aria-hidden="true"></div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="searchView">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <span>検索</span>
    </button>
    <button class="nav-btn" data-view="queueView">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
      </svg>
      <span>キュー</span>
      <span class="badge" id="queueBadge" hidden>0</span>
    </button>
    <button class="nav-btn" data-view="settingsView">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span>設定</span>
    </button>
  </nav>

  <script src="/js/html5-qrcode.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
